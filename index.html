<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fbf8f2">
  <title>Moj boljši dan</title>
  <meta name="description" content="Tvoja dnevna doza energije, navad in nežne motivacije.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --cream: #fbf8f2;
      --cream-2: #f5efe5;
      --paper: #fffdf9;
      --ink: #244a43;
      --ink-soft: #55706b;
      --muted: #7b8885;
      --sage: #80a98c;
      --sage-deep: #5d8e70;
      --sage-pale: #edf3e9;
      --blush: #f18a87;
      --blush-pale: #fff0ed;
      --gold: #efad47;
      --gold-pale: #fff4df;
      --lilac: #8e80cf;
      --lilac-pale: #f1edfb;
      --blue-pale: #eaf4ff;
      --line: rgba(51, 72, 66, .1);
      --shadow: 0 18px 48px rgba(76, 69, 55, .08);
      --shadow-soft: 0 8px 25px rgba(76, 69, 55, .07);
      --serif: "Playfair Display", Georgia, serif;
      --sans: "DM Sans", system-ui, sans-serif;
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 65% 3%, rgba(244, 211, 168, .2), transparent 24rem),
        linear-gradient(115deg, #f7f2e9 0, var(--cream) 24%, #fffdf8 100%);
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 224px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 34px 24px 28px;
      border-right: 1px solid rgba(68, 78, 66, .08);
      background: rgba(250, 247, 240, .78);
      backdrop-filter: blur(18px);
      z-index: 20;
      overflow: hidden;
    }

    .sidebar::after {
      content: "❀  ✿";
      position: absolute;
      left: 20px;
      bottom: 5px;
      color: rgba(241, 138, 135, .22);
      font-size: 62px;
      letter-spacing: -20px;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 56px;
      color: var(--ink);
    }

      width: 28px;
      color: var(--gold);
